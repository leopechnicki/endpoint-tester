name: Auto Release (Friday)

on:
  schedule:
    - cron: '0 12 * * 5'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Check for new commits since last tag
        id: check
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "No previous tag found, will create initial release"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            COMMITS=$(git rev-list "${LAST_TAG}..HEAD" --count)
            echo "Commits since $LAST_TAG: $COMMITS"
            if [ "$COMMITS" -gt 0 ]; then
              echo "has_changes=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Create release
        if: steps.check.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Read current version from package.json (source of truth for the release tag)
          CURRENT=$(node -p "require('./package.json').version")
          RELEASE_VERSION="v${CURRENT}"
          echo "Release version: $RELEASE_VERSION"

          # Compute next dev version for the post-release bump PR
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "Next dev version: $NEXT_VERSION"

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges "${LAST_TAG}..HEAD")
          fi

          # Tag and release using the current package.json version
          gh release create "$RELEASE_VERSION" \
            --title "Release $RELEASE_VERSION" \
            --notes "## What's Changed

          $CHANGELOG

          ---
          *Auto-released on $(date -u +%Y-%m-%d)*" \
            --target main

          # Create a PR to bump package.json to the next patch version
          BRANCH="chore/bump-version-v${NEXT_VERSION}"
          git checkout -b "$BRANCH"
          npm version "$NEXT_VERSION" --no-git-tag-version
          git add package.json package-lock.json 2>/dev/null || git add package.json
          git commit -m "chore: bump version to ${NEXT_VERSION} [skip ci]"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: bump version to ${NEXT_VERSION}" \
            --body "Automated version bump after release $RELEASE_VERSION" \
            --base main \
            --head "$BRANCH"
